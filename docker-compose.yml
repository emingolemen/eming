# Local Postgres for Payload (matches Supabase Postgres in production).
# Usage: docker compose up -d
# Then set DATABASE_URL in .env to postgres://postgres:postgres@127.0.0.1:5432/eming

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eming
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
